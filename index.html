<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaJS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>
    <div class="page">
        <main class="container">
            <section class="hero">
                <p class="eyebrow">Traducteur expérimental</p>
                <h1>GrammaJS</h1>
                <p class="subtitle">Transformez du Français en Meniki avec GrammaJS grâce à un dictionnaire propre. Le
                    Meniki ne se conjugue pas: on place <strong>efu</strong> devant le verbe pour le futur et
                    <strong>emas</strong> pour le passé. Vous pouvez télécharger l'application pour l'utiliser
                    en mode hors-ligne.</p>
            </section>

            <section class="translator-card">
                <label for="sourceText">Texte source en français</label>
                <textarea id="sourceText" placeholder="Entrez du français..."></textarea>
                <button onclick="handleTranslate()">Traduire avec GrammaJS</button>
                <div id="result" aria-live="polite"></div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        // Enregistrement du Service Worker pour le mode hors-ligne
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>

</html>
